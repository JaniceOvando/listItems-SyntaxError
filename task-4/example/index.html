<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap 5 CDN (stackpath ya no funciona) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Mensajería Total — Catálogo</title>

    <style>
        body { background-color: #f0f4f0; }
        .card { border: none; border-radius: 12px; transition: transform .25s, box-shadow .25s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 24px rgba(22,163,74,.15); }
        .card-title { color: #14532d; font-weight: 700; }
        .card-img-top { border-radius: 12px 12px 0 0; }
        .page-header { background: white; padding: 2rem 0; border-bottom: 1px solid #d1d5db; margin-bottom: 2rem; }
        .page-header h1 { color: #14532d; font-weight: 700; }
        .form-section { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
        .form-section h2 { color: #16a34a; font-size: 1.1rem; font-weight: 700; }
        .btn-primary {
            background-color: #16a34a !important;
            border-color: #16a34a !important;
        }

        .btn-primary:hover {
            background-color: #14532d !important;
            border-color: #14532d !important;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-success" href="#">🚴 Mensajería Total</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold text-success" href="#">Catálogo</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- HEADER -->
    <div class="page-header text-center">
        <div class="container">
            <h1>Nuestros Servicios de Envío</h1>
            <p class="text-muted">Encuentra el servicio ideal para tu paquete</p>
        </div>
    </div>

    <div class="container">

        <!-- FORM -->
        <div class="form-section">
            <h2>Agregar nuevo servicio</h2>
            <form id="newItemForm">
                <div class="mb-3">
                    <label for="newItemNameInput" class="form-label">Name</label>
                    <input type="text" class="form-control" id="newItemNameInput" placeholder="Ej. Envío Express">
                </div>
                <div class="mb-3">
                    <label for="newItemDescription" class="form-label">Description</label>
                    <textarea class="form-control" id="newItemDescription" placeholder="Descripción del servicio"></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Agregar Productos</button>
            </form>
        </div>

        <!-- LISTA — se llena con JS -->
        <div class="row" id="list-items">
        </div>

    </div>

    <!-- FOOTER -->
    <footer class="text-center py-4 text-muted small mt-4">
        2026 &copy; Mensajería Total S.A. de C.V.
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- IMPORTANTE: itemsController SIEMPRE antes que index.js -->
    <script src="js/ItemsController.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
